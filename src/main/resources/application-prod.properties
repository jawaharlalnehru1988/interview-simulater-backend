# ──────────────────────────────────────────────────────────────────────────────
# Production profile – loaded when SPRING_PROFILES_ACTIVE=prod
# All sensitive values are injected from /etc/systemd/system/interview-backend.service
# ──────────────────────────────────────────────────────────────────────────────

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:interview_simulator}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:interview_app}
spring.datasource.password=${POSTGRES_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Server
server.port=8080

# File Uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Logging
logging.level.root=WARN
logging.level.com.asknehru.interviewsimulator=INFO
