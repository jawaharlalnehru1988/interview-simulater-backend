spring.application.name=interview-simulator
spring.profiles.active=local

# Security/Auth
jwt.secret=ASKNEHRU_CHANGE_THIS_SECRET_TO_BASE64_OR_LONG_RANDOM_TEXT_1234567890
jwt.expiration=86400000

# Interview Settings
interview.max-questions=${INTERVIEW_MAX_QUESTIONS:10}

# LLM Settings
llm.api-key=${LLM_API_KEY:}
llm.model=${LLM_MODEL:gpt-5.4-mini}
llm.base-url=${LLM_BASE_URL:https://api.openai.com/v1/chat/completions}
llm.request-timeout=${LLM_REQUEST_TIMEOUT:30}
llm.max-retries=${LLM_MAX_RETRIES:2}
llm.retry-backoff-seconds=${LLM_RETRY_BACKOFF_SECONDS:0.5}

# Server
server.port=8080

# Spring AI Configuration
spring.ai.openai.api-key=${llm.api-key}
spring.ai.openai.chat.options.model=${llm.model}
spring.ai.openai.embedding.options.model=text-embedding-3-small
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536
